<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOVIRA — Espace Factures</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       RESET & BASE
       ============================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000000;
      --violet: #7C3AED;
      --violet-hover: #6D28D9;
      --highlight: #A78BFA;
      --card-bg: rgba(255,255,255,0.03);
      --card-border: rgba(124,58,237,0.2);
      --input-bg: rgba(255,255,255,0.04);
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.5);
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3 { font-family: 'Bebas Neue', cursive; letter-spacing: 1.5px; }

    /* ============================================
       SHIMMER ANIMATION
       ============================================ */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* ============================================
       BOUTON PRINCIPAL
       ============================================ */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--violet);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.15) 50%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmer 2.5s infinite;
    }

    .btn-primary:hover { background: var(--violet-hover); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* ============================================
       CARDS
       ============================================ */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 32px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* ============================================
       INPUTS
       ============================================ */
    .form-group { margin-bottom: 20px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--highlight);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--violet);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    .form-group select { cursor: pointer; }
    .form-group select option { background: #1a1a1a; color: #fff; }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-group input[type="file"] {
      padding: 10px;
      cursor: pointer;
    }

    .form-group input[type="file"]::file-selector-button {
      padding: 6px 16px;
      background: var(--violet);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-right: 12px;
    }

    .form-group .readonly-field {
      background: rgba(124,58,237,0.08);
      border-color: rgba(124,58,237,0.3);
      font-weight: 600;
      font-size: 16px;
      color: var(--highlight);
    }

    /* ============================================
       VUE 1 — LOGIN
       ============================================ */
    #view-login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 440px;
      text-align: center;
      animation: fadeInUp 0.5s ease;
    }

    .login-card .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 48px;
      letter-spacing: 6px;
      color: #fff;
      margin-bottom: 8px;
    }

    .login-card .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .login-card .form-group { text-align: left; }

    .login-card .btn-primary {
      width: 100%;
      justify-content: center;
      margin-top: 8px;
    }

    /* ============================================
       VUE 2 — DASHBOARD
       ============================================ */
    #view-dashboard { display: none; }

    /* NAVBAR */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 100;
    }

    .navbar .nav-logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      letter-spacing: 4px;
      color: #fff;
    }

    .navbar .nav-greeting {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .navbar .btn-logout {
      padding: 8px 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .navbar .btn-logout:hover { background: rgba(255,255,255,0.1); }

    /* MAIN CONTENT */
    .dashboard-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .section-title {
      font-size: 32px;
      letter-spacing: 2px;
      margin-bottom: 24px;
      color: #fff;
    }

    .section-title span { color: var(--violet); }

    /* FORM GRID */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 20px;
    }

    .form-grid .full-width { grid-column: 1 / -1; }

    /* ============================================
       CONFIRMATION MESSAGE
       ============================================ */
    .confirmation {
      display: none;
      text-align: center;
      padding: 24px;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: var(--radius);
      margin-top: 20px;
      animation: fadeInUp 0.4s ease;
      font-size: 15px;
      font-weight: 500;
      color: #4ade80;
    }

    .confirmation.show { display: block; }

    /* ============================================
       TABLEAU FACTURES
       ============================================ */
    .invoices-section { margin-top: 56px; }

    .table-wrapper {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      text-align: left;
      padding: 14px 16px;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--highlight);
      background: rgba(124,58,237,0.06);
      border-bottom: 1px solid var(--card-border);
      white-space: nowrap;
    }

    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(124,58,237,0.04); }

    /* BADGES STATUT */
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-attente { background: rgba(250,204,21,0.12); color: #facc15; }
    .badge-encours { background: rgba(59,130,246,0.12); color: #60a5fa; }
    .badge-payee { background: rgba(34,197,94,0.12); color: #4ade80; }
    .badge-probleme { background: rgba(239,68,68,0.12); color: #f87171; }

    /* BOUTON VOIR PDF */
    .btn-pdf {
      padding: 5px 14px;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.25);
      color: var(--highlight);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }

    .btn-pdf:hover { background: rgba(124,58,237,0.2); }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 15px;
    }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }

      .navbar {
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }

      .navbar .nav-greeting { order: 3; width: 100%; text-align: center; }

      .login-card .logo { font-size: 36px; }
      .section-title { font-size: 26px; }
      .card { padding: 24px 18px; }

      table { font-size: 13px; }
      thead th, tbody td { padding: 10px 12px; }
    }
  </style>
</head>
<body>

  <!-- ============================================
       VUE 1 — LOGIN
       ============================================ -->
  <div id="view-login">
    <div class="login-card card">
      <div class="logo">DOVIRA</div>
      <p class="subtitle">Espace monteurs — Gestion des factures</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-prenom">Prénom *</label>
          <input type="text" id="login-prenom" placeholder="Ton prénom" required>
        </div>
        <div class="form-group">
          <label for="login-nom">Nom *</label>
          <input type="text" id="login-nom" placeholder="Ton nom" required>
        </div>
        <div class="form-group">
          <label for="login-email">Email *</label>
          <input type="email" id="login-email" placeholder="ton@email.com" required>
        </div>
        <button type="submit" class="btn-primary">Accéder à mon espace →</button>
      </form>
    </div>
  </div>

  <!-- ============================================
       VUE 2 — DASHBOARD
       ============================================ -->
  <div id="view-dashboard">

    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-logo">DOVIRA</div>
      <div class="nav-greeting" id="nav-greeting">Bonjour 👋</div>
      <button class="btn-logout" id="btn-logout">Se déconnecter</button>
    </nav>

    <div class="dashboard-content">

      <!-- SECTION 1 — FORMULAIRE DÉPÔT -->
      <section>
        <h2 class="section-title">DÉPOSER UNE <span>FACTURE</span></h2>

        <div class="card">
          <form id="invoice-form" novalidate>
            <div class="form-grid">

              <div class="form-group">
                <label for="inv-mois">Mois de la prestation *</label>
                <select id="inv-mois" required>
                  <option value="">— Sélectionner —</option>
                </select>
              </div>

              <div class="form-group">
                <label for="inv-numero">Numéro de facture *</label>
                <input type="text" id="inv-numero" placeholder="FAC-2026-001" required>
              </div>

              <div class="form-group">
                <label for="inv-montant-ht">Montant HT (€) *</label>
                <input type="number" id="inv-montant-ht" placeholder="1200" min="0" step="0.01" required>
              </div>

              <div class="form-group">
                <label for="inv-tva">TVA *</label>
                <select id="inv-tva" required>
                  <option value="0">0%</option>
                  <option value="20">20%</option>
                </select>
              </div>

              <div class="form-group">
                <label for="inv-montant-ttc">Montant TTC</label>
                <input type="text" id="inv-montant-ttc" class="readonly-field" readonly value="0 €">
              </div>

              <div class="form-group">
                <label>&nbsp;</label>
                <!-- spacer for grid alignment -->
              </div>

              <div class="form-group full-width">
                <label for="inv-description">Description de la mission *</label>
                <textarea id="inv-description" placeholder='Ex: "Montage 8 Reels pour @client"' required></textarea>
              </div>

              <div class="form-group full-width">
                <label for="inv-pdf">Upload PDF de la facture</label>
                <input type="file" id="inv-pdf" accept="application/pdf">
              </div>

            </div>

            <button type="submit" class="btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
              Envoyer ma facture →
            </button>
          </form>

          <div class="confirmation" id="confirmation">
            ✅ Facture envoyée ! Khalid a été notifié.
          </div>
        </div>
      </section>

      <!-- SECTION 2 — MES FACTURES -->
      <section class="invoices-section">
        <h2 class="section-title">MES <span>FACTURES</span></h2>

        <div id="invoices-container"></div>
      </section>

    </div>
  </div>

  <!-- ============================================
       JAVASCRIPT
       ============================================ -->
  <script>
    /* ============================================
       UTILITAIRES
       ============================================ */

    /** Formate un nombre en format français lisible : 1 200 € */
    function formatMontant(n) {
      return Number(n).toLocaleString('fr-FR') + ' €';
    }

    /** Retourne le badge HTML pour un statut donné */
    function badgeStatut(statut) {
      const map = {
        'En attente': '<span class="badge badge-attente">🟡 En attente</span>',
        'En cours':   '<span class="badge badge-encours">🔵 En cours</span>',
        'Payée':      '<span class="badge badge-payee">🟢 Payée</span>',
        'Problème':   '<span class="badge badge-probleme">🔴 Problème</span>',
      };
      return map[statut] || statut;
    }

    /** Retourne toutes les factures stockées */
    function getFactures() {
      return JSON.parse(localStorage.getItem('dovira_factures') || '[]');
    }

    /** Sauvegarde les factures */
    function setFactures(arr) {
      localStorage.setItem('dovira_factures', JSON.stringify(arr));
    }

    /** Retourne le profil connecté ou null */
    function getProfil() {
      const d = localStorage.getItem('dovira_profil');
      return d ? JSON.parse(d) : null;
    }

    /** Calcule le prochain numéro de facture incrémental */
    function prochainNumero() {
      const factures = getFactures();
      const year = new Date().getFullYear();
      let max = 0;
      factures.forEach(f => {
        const m = f.numero.match(/FAC-\d{4}-(\d+)/);
        if (m) max = Math.max(max, parseInt(m[1], 10));
      });
      return 'FAC-' + year + '-' + String(max + 1).padStart(3, '0');
    }

    /* ============================================
       DONNÉES DE TEST
       ============================================ */
    function initTestData() {
      if (localStorage.getItem('dovira_factures')) return;

      const testFactures = [
        {
          prenom: 'Lucas',
          nom: 'Martin',
          email: 'lucas@test.fr',
          numero: 'FAC-2026-001',
          mois: 'Janvier 2026',
          montantHT: 450,
          tva: 0,
          montantTTC: 450,
          description: 'Montage 6 Reels @TomyMotiv',
          statut: 'Payée',
          dateEnvoi: '2026-01-15',
          pdf: null,
        },
        {
          prenom: 'Sofia',
          nom: 'Benali',
          email: 'sofia@test.fr',
          numero: 'FAC-2026-002',
          mois: 'Février 2026',
          montantHT: 600,
          tva: 20,
          montantTTC: 720,
          description: 'Pack Ads Meta @angelorodrigues__',
          statut: 'En attente',
          dateEnvoi: '2026-02-20',
          pdf: null,
        }
      ];

      setFactures(testFactures);
    }

    /* ============================================
       INITIALISATION SELECT MOIS
       ============================================ */
    function initMoisSelect() {
      const select = document.getElementById('inv-mois');
      const moisNoms = [
        'Janvier','Février','Mars','Avril','Mai','Juin',
        'Juillet','Août','Septembre','Octobre','Novembre','Décembre'
      ];
      const annees = [2025, 2026];

      annees.forEach(annee => {
        moisNoms.forEach(mois => {
          const opt = document.createElement('option');
          opt.value = mois + ' ' + annee;
          opt.textContent = mois + ' ' + annee;
          select.appendChild(opt);
        });
      });
    }

    /* ============================================
       CALCUL TTC EN TEMPS RÉEL
       ============================================ */
    function updateTTC() {
      const ht = parseFloat(document.getElementById('inv-montant-ht').value) || 0;
      const tva = parseInt(document.getElementById('inv-tva').value) || 0;
      const ttc = ht * (1 + tva / 100);
      document.getElementById('inv-montant-ttc').value = formatMontant(ttc);
    }

    /* ============================================
       RENDU TABLEAU FACTURES
       ============================================ */
    function renderFactures() {
      const container = document.getElementById('invoices-container');
      const profil = getProfil();
      if (!profil) return;

      const factures = getFactures().filter(
        f => f.email.toLowerCase() === profil.email.toLowerCase()
      );

      if (factures.length === 0) {
        container.innerHTML = '<div class="empty-state">Aucune facture déposée pour le moment.</div>';
        return;
      }

      let html = `
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>N° Facture</th>
                <th>Mois</th>
                <th>Montant TTC</th>
                <th>Description</th>
                <th>Date d'envoi</th>
                <th>Statut</th>
                <th>PDF</th>
              </tr>
            </thead>
            <tbody>
      `;

      factures.forEach((f, i) => {
        const dateFormatted = new Date(f.dateEnvoi).toLocaleDateString('fr-FR', {
          day: '2-digit', month: '2-digit', year: 'numeric'
        });

        html += `
          <tr>
            <td style="font-weight:600;color:var(--highlight)">${f.numero}</td>
            <td>${f.mois}</td>
            <td style="font-weight:600">${formatMontant(f.montantTTC)}</td>
            <td>${f.description}</td>
            <td>${dateFormatted}</td>
            <td>${badgeStatut(f.statut)}</td>
            <td>
              ${f.pdf
                ? '<button class="btn-pdf" onclick="voirPDF(\'' + f.numero + '\')">Voir PDF</button>'
                : '<span style="color:var(--text-muted);font-size:12px">—</span>'
              }
            </td>
          </tr>
        `;
      });

      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    /** Ouvre le PDF en base64 dans un nouvel onglet */
    function voirPDF(numero) {
      const factures = getFactures();
      const f = factures.find(x => x.numero === numero);
      if (!f || !f.pdf) return;

      // Convertir base64 en blob URL
      const byteChars = atob(f.pdf.split(',')[1]);
      const byteArrays = [];
      for (let i = 0; i < byteChars.length; i += 512) {
        const slice = byteChars.slice(i, i + 512);
        const byteNumbers = new Array(slice.length);
        for (let j = 0; j < slice.length; j++) {
          byteNumbers[j] = slice.charCodeAt(j);
        }
        byteArrays.push(new Uint8Array(byteNumbers));
      }
      const blob = new Blob(byteArrays, { type: 'application/pdf' });
      window.open(URL.createObjectURL(blob), '_blank');
    }

    /* ============================================
       NAVIGATION LOGIN ↔ DASHBOARD
       ============================================ */
    function showLogin() {
      document.getElementById('view-login').style.display = 'flex';
      document.getElementById('view-dashboard').style.display = 'none';
    }

    function showDashboard() {
      const profil = getProfil();
      if (!profil) return showLogin();

      document.getElementById('view-login').style.display = 'none';
      document.getElementById('view-dashboard').style.display = 'block';
      document.getElementById('nav-greeting').textContent = 'Bonjour ' + profil.prenom + ' 👋';
      document.getElementById('inv-numero').value = prochainNumero();
      updateTTC();
      renderFactures();
    }

    /* ============================================
       EVENT LISTENERS
       ============================================ */

    // LOGIN
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const prenom = document.getElementById('login-prenom').value.trim();
      const nom = document.getElementById('login-nom').value.trim();
      const email = document.getElementById('login-email').value.trim();

      if (!prenom || !nom || !email) {
        alert('Merci de remplir tous les champs.');
        return;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        alert('Adresse email invalide.');
        return;
      }

      localStorage.setItem('dovira_profil', JSON.stringify({ prenom, nom, email }));
      showDashboard();
    });

    // LOGOUT
    document.getElementById('btn-logout').addEventListener('click', function() {
      localStorage.removeItem('dovira_profil');
      showLogin();
      // Reset login form
      document.getElementById('login-form').reset();
    });

    // CALCUL TTC TEMPS RÉEL
    document.getElementById('inv-montant-ht').addEventListener('input', updateTTC);
    document.getElementById('inv-tva').addEventListener('change', updateTTC);

    // SOUMISSION FACTURE
    document.getElementById('invoice-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const profil = getProfil();
      if (!profil) return;

      const mois = document.getElementById('inv-mois').value;
      const numero = document.getElementById('inv-numero').value.trim();
      const montantHT = parseFloat(document.getElementById('inv-montant-ht').value);
      const tva = parseInt(document.getElementById('inv-tva').value);
      const description = document.getElementById('inv-description').value.trim();
      const pdfInput = document.getElementById('inv-pdf');

      // Validation
      if (!mois || !numero || isNaN(montantHT) || !description) {
        alert('Merci de remplir tous les champs obligatoires.');
        return;
      }

      if (montantHT <= 0) {
        alert('Le montant HT doit être supérieur à 0.');
        return;
      }

      // Vérifier si fichier est bien un PDF
      if (pdfInput.files.length > 0 && pdfInput.files[0].type !== 'application/pdf') {
        alert('Seuls les fichiers PDF sont acceptés.');
        return;
      }

      const montantTTC = montantHT * (1 + tva / 100);

      // Lire le PDF en base64 si présent
      let pdfBase64 = null;
      if (pdfInput.files.length > 0) {
        pdfBase64 = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.readAsDataURL(pdfInput.files[0]);
        });
      }

      // Créer l'objet facture
      const facture = {
        prenom: profil.prenom,
        nom: profil.nom,
        email: profil.email,
        numero,
        mois,
        montantHT,
        tva,
        montantTTC,
        description,
        statut: 'En attente',
        dateEnvoi: new Date().toISOString().split('T')[0],
        pdf: pdfBase64,
      };

      // 1. Sauvegarder en localStorage
      const factures = getFactures();
      factures.push(facture);
      setFactures(factures);

      // 2. Envoyer email via Formspree
      try {
        await fetch('https://formspree.io/f/xojkzzap', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({
            _subject: 'Nouvelle facture Dovira — ' + profil.prenom + ' ' + profil.nom + ' — ' + numero,
            'Prénom': profil.prenom,
            'Nom': profil.nom,
            'Email monteur': profil.email,
            'Numéro facture': numero,
            'Mois prestation': mois,
            'Montant HT': formatMontant(montantHT),
            'TVA': tva + '%',
            'Montant TTC': formatMontant(montantTTC),
            'Description mission': description,
          }),
        });
      } catch (err) {
        console.warn('Formspree error:', err);
      }

      // 3. Confirmation animée
      const conf = document.getElementById('confirmation');
      conf.classList.add('show');
      setTimeout(() => conf.classList.remove('show'), 4000);

      // Reset form & refresh
      document.getElementById('invoice-form').reset();
      document.getElementById('inv-numero').value = prochainNumero();
      updateTTC();
      renderFactures();
    });

    /* ============================================
       BOOT
       ============================================ */
    initTestData();
    initMoisSelect();

    // Si déjà connecté → dashboard direct
    if (getProfil()) {
      showDashboard();
    }
  </script>
</body>
</html>
